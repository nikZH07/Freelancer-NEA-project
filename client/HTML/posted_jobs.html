<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Posted Jobs</title>
</head>
<body>
    
    <!-- nav bar -->

    <div class="wrapper_outer">
        <button class="create_job_btn">
            + Create
        </button>

        <div class="wrapper_inner">
            <a href="marketplace.html"><button class="page_redirect"><i class="fa-solid fa-shop page_icon"></i></button></a>
            <a href="posted_jobs.html"><button class="page_redirect posted_jobs_redirect"><i class="fa-solid fa-envelope page_icon" style="color: rgb(34, 52, 90);"></i></button></a>
            <a href="accepted_jobs.html"><button class="page_redirect"><i class="fa-solid fa-handshake page_icon"></i></button></a>
            <a href="settings.html"><button class="page_redirect"><i class="fa-solid fa-gear page_icon"></i></button></a>
        </div>
    </div>
<!-- Comment -->
    <!-- main page -->

    <div class="wrapper">
        <!-- <div class="job_box">
            <p class="job_title">Help move a desk</p>
            <p class="job_description">Need help carrying a medium-sized desk from one room to another 
                in my house. Should take no longer than 20 minutes.</p>
            <div class="job_info">
                <p>by Alex Turner</p>
                <p>Accepted date: 23-01-2026</p>
            </div>
        </div> -->

        <div class="job_box0 empty_box">
            <button class="add_btn_in">+</button>
            <p class="free_job_text">Accept another job</p>
        </div>

        <div class="job_box1 empty_box">
            <button class="add_btn_in">+</button>
            <p class="free_job_text">Accept another job</p>
        </div>

        <div class="job_box2 empty_box">
            <button class="add_btn_in">+</button>
            <p class="free_job_text">Accept another job</p>
        </div>
    </div>

    <!-- create job overlay menu -->

    <h1>Post a job</h1>
    <form class="jobForm">
        <input type="text" name="firstname" placeholder="first name:" class="firstname" required>
        <input type="text" name="lastname" placeholder="last name:" class="lastname" required>
        <input type="text" name="jobtitle" placeholder="job title:" class="jobtitle" required>
        <input type="text" name="jobdescription" placeholder="job description:" class="jobdescription" required>
        <button type="submit">Submit</button>
    </form>
    <button class="deleteBtn">Clear Database</button>
    <p class="message"></p>

    <div class="status_message success_m">
        <p>Success</p>
        <button>
            <img src="../images/xmark-solid-full (1).svg" class="close_btn">
        </button>
    </div>

    <div class="status_message failure_m" style="background-color: red;;">
        <p>Failure</p>
        <button>
            <img src="../images/xmark-solid-full (1).svg" class="close_btn">
        </button>
    </div>

    <script src="../JS/posted_jobs.js"></script>
    
</body>
</html>
