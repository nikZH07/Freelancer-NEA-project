<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    
    <div class="login_wrapper" style="display: flex; flex-direction: column; justify-content: center; width: 300px; gap: 1rem;">

        <p class="login_title">Login</p>

        <form action="/login" method="POST">

            <div>
                <label for="username"><i class="fa-solid fa-circle-user" style="color: rgb(0, 0, 0);"></i></label>
                <input type="text" id="username" name="username" placeholder="Username:" required>
            </div>

            <div>
                <label for="password"><i class="fa-solid fa-key" style="color: rgb(0, 0, 0);"></i></label>
                <input type="password" id="password" name="password" placeholder="Password:" required>
            </div>

            <button type="submit">Login</button>

        </form>
    </div>

</body>
</html>
